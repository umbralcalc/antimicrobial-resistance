main:
  partitions:

  # Partition 0: Cycling policy — alternate cephalosporin rate quarterly
  - name: prescribing
    iteration: prescribing
    params:
      high_rate: [0.3]
      low_rate: [0.05]
      cycle_period: [13.0]
    init_state_values: [0.3]
    state_history_depth: 1
    seed: 0
    extra_packages:
    - github.com/umbralcalc/antimicrobial-resistance/pkg/amr
    extra_vars:
    - prescribing: "&amr.CyclingPrescribingIteration{}"

  # Partition 1: Colonisation dynamics with learned parameters
  - name: colonisation
    iteration: colonisation
    params:
      community_susceptible_prevalence: [0.15]
      community_resistant_prevalence: [0.1164]
      turnover_rate: [0.1]
      transmission_rate: [0.0384]
      selection_coefficient: [0.1351]
      fitness_cost: [0.0170]
      noise_scale: [0.01]
      prescribing_partition: [0]
    init_state_values: [0.15, 0.05]
    state_history_depth: 1
    seed: 9182
    extra_packages:
    - github.com/umbralcalc/antimicrobial-resistance/pkg/amr
    extra_vars:
    - colonisation: "&amr.ColonisationDynamicsIteration{}"

  # Partition 2: Infection process
  - name: infection
    iteration: infection
    params:
      infection_probability: [0.01]
      patient_population: [500.0]
      colonisation_partition: [1]
    init_state_values: [0.0, 0.0]
    state_history_depth: 1
    seed: 3347
    extra_packages:
    - github.com/umbralcalc/antimicrobial-resistance/pkg/amr
    extra_vars:
    - infection: "&amr.InfectionProcessIteration{}"

  simulation:
    output_condition: "&simulator.EveryStepOutputCondition{}"
    output_function: "simulator.NewJsonLogOutputFunction(\"./dat/policy_cycling_output.log\")"
    termination_condition: "&simulator.NumberOfStepsTerminationCondition{MaxNumberOfSteps: 200}"
    timestep_function: "&simulator.ConstantTimestepFunction{Stepsize: 1.0}"
    init_time_value: 0.0
